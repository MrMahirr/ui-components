<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
    <defs>
        <!-- Smooth neon glow filter -->
        <filter id="cosmicGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="12" result="blur1" />
            <feGaussianBlur stdDeviation="6" result="blur2" />
            <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="blur2" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <!-- Vibrant cyber gradient matching the exact design of the logo -->
        <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00D2FF" />
            <stop offset="45%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#8B5CF6" />
        </linearGradient>

        <linearGradient id="innerGradient" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8B5CF6" />
            <stop offset="55%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#00D2FF" />
        </linearGradient>
    </defs>

    <!-- Outer Left Bracket < -->
    <path d="M 152,148 L 70,256 L 152,364" 
          stroke="url(#cyberGradient)" 
          stroke-width="22" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          filter="url(#cosmicGlow)" 
          opacity="0.9" />

    <!-- Outer Right Bracket > -->
    <path d="M 360,148 L 442,256 L 360,364" 
          stroke="url(#cyberGradient)" 
          stroke-width="22" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          filter="url(#cosmicGlow)" 
          opacity="0.9" />

    <!-- Left Vertical Pillar of M -->
    <path d="M 196,130 L 196,382" 
          stroke="url(#cyberGradient)" 
          stroke-width="18" 
          stroke-linecap="round" 
          filter="url(#cosmicGlow)" />

    <!-- Right Vertical Pillar of M -->
    <path d="M 316,130 L 316,382" 
          stroke="url(#cyberGradient)" 
          stroke-width="18" 
          stroke-linecap="round" 
          filter="url(#cosmicGlow)" />

    <!-- C-Arc wrapping the center -->
    <path d="M 310,202 A 76,76 0 1 0 310,310" 
          stroke="url(#cyberGradient)" 
          stroke-width="18" 
          stroke-linecap="round" 
          filter="url(#cosmicGlow)" />

    <!-- M-diagonal left connecting to center -->
    <path d="M 196,130 L 256,256" 
          stroke="url(#innerGradient)" 
          stroke-width="16" 
          stroke-linecap="round" 
          filter="url(#cosmicGlow)" />

    <!-- M-diagonal right connecting to center -->
    <path d="M 316,130 L 256,256" 
          stroke="url(#innerGradient)" 
          stroke-width="16" 
          stroke-linecap="round" 
          filter="url(#cosmicGlow)" />

    <!-- Central Glowing Circle Node -->
    <circle cx="256" cy="256" r="24" 
            stroke="url(#cyberGradient)" 
            stroke-width="16" 
            fill="#05050A" 
            filter="url(#cosmicGlow)" />
</svg>